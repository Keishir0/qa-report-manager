version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qa-report-postgres
    environment:
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
      POSTGRES_DB: qa_report
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qa-report-app
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://qa_user:qa_password@postgres:5432/qa_report?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL_CHAIN=${OPENROUTER_MODEL_CHAIN}
      - APP_URL=http://localhost:3000
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - postgres
    volumes:
      - ./logs:/app/logs
    restart: always

volumes:
  postgres_data:
